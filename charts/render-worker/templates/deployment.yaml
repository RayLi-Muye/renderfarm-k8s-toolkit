apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "render-worker.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "render-worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "render-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "render-worker.selectorLabels" . | nindent 8 }}
        workload.renderfarm.dev/type: worker
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "render-worker.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          args:
            {{- toYaml .Values.worker.args | nindent 12 }}
          env:
            {{- range $name, $value := .Values.worker.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if or .Values.configMap.create .Values.secret.create }}
          envFrom:
            {{- if .Values.configMap.create }}
            - configMapRef:
                name: {{ include "render-worker.fullname" . }}-config
            {{- end }}
            {{- if .Values.secret.create }}
            - secretRef:
                name: {{ include "render-worker.fullname" . }}-secret
            {{- end }}
          {{- end }}
          resources:
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{- if .Values.gpu.enabled }}
              {{ .Values.gpu.resourceName }}: {{ .Values.gpu.count | quote }}
              {{- end }}
          volumeMounts:
            - name: workdir
              mountPath: {{ .Values.worker.env.RENDER_TMP_DIR | quote }}
      volumes:
        - name: workdir
          emptyDir:
            {{- toYaml .Values.workdir.emptyDir | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
