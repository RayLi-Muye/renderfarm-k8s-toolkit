nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: render-workers

replicaCount: 0

image:
  repository: ghcr.io/rayli-muye/render-worker
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

worker:
  command:
    - /bin/sh
    - -c
  args:
    - echo "render worker image not configured"; sleep 3600
  env:
    AWS_REGION: us-east-1
    RENDER_TMP_DIR: /work
    LOG_LEVEL: info

adapters:
  queue:
    type: mock
    envName: QUEUE_URL
    sqs:
      queueURL: ""
      awsRegion: us-east-1
      queueLength: "1"
    mock:
      queueName: ""
  storage:
    type: local
    assetEnvName: ASSET_BUCKET
    outputEnvName: OUTPUT_BUCKET
    s3:
      assetBucket: ""
      outputBucket: ""
      awsRegion: us-east-1
    local:
      assetPath: ""
      outputPath: ""
    minio:
      endpoint: ""
      assetBucket: ""
      outputBucket: ""
      region: us-east-1
  identity:
    type: none
    irsa:
      annotationKey: eks.amazonaws.com/role-arn
      roleArn: ""
    podIdentity:
      provider: aws
    existingSecret:
      name: ""

resources:
  requests:
    cpu: "4"
    memory: 16Gi
  limits:
    cpu: "4"
    memory: 16Gi

gpu:
  enabled: false
  resourceName: nvidia.com/gpu
  count: 1

workdir:
  emptyDir: {}

configMap:
  create: true
  data: {}

secret:
  create: false
  stringData: {}

nodeSelector: {}
tolerations: []
affinity: {}

keda:
  enabled: false
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 300
  queueLength: "1"
  authentication:
    enabled: false
    name: ""
    podIdentity:
      provider: aws
  trigger:
    type: aws-sqs-queue
    queueURLFromEnv: QUEUE_URL
    awsRegion: us-east-1

postprocessJob:
  enabled: false
  nameSuffix: postprocess
  image:
    repository: ghcr.io/rayli-muye/render-postprocess
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  command:
    - /bin/sh
    - -c
  args:
    - echo "postprocess image not configured"
  env:
    AWS_REGION: us-east-1
    INPUT_PREFIX: ""
    OUTPUT_PREFIX: ""
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  ttlSecondsAfterFinished: 7200
  backoffLimit: 1
