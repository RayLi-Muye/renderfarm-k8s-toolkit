nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: render-workers

replicaCount: 0

image:
  repository: ghcr.io/rayli-muye/render-worker
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

worker:
  command:
    - /bin/sh
    - -c
  args:
    - echo "render worker image not configured"; sleep 3600
  env:
    AWS_REGION: us-east-1
    ASSET_BUCKET: ""
    OUTPUT_BUCKET: ""
    QUEUE_URL: ""
    RENDER_TMP_DIR: /work
    LOG_LEVEL: info

resources:
  requests:
    cpu: "4"
    memory: 16Gi
  limits:
    cpu: "4"
    memory: 16Gi

gpu:
  enabled: false
  resourceName: nvidia.com/gpu
  count: 1

workdir:
  emptyDir: {}

configMap:
  create: true
  data: {}

secret:
  create: false
  stringData: {}

nodeSelector: {}
tolerations: []
affinity: {}

keda:
  enabled: false
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 300
  queueLength: "1"
  trigger:
    type: aws-sqs-queue
    queueURLFromEnv: QUEUE_URL
    awsRegion: us-east-1

postprocessJob:
  enabled: false
  nameSuffix: postprocess
  image:
    repository: ghcr.io/rayli-muye/render-postprocess
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  command:
    - /bin/sh
    - -c
  args:
    - echo "postprocess image not configured"
  env:
    AWS_REGION: us-east-1
    INPUT_PREFIX: ""
    OUTPUT_PREFIX: ""
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi
  ttlSecondsAfterFinished: 7200
  backoffLimit: 1

