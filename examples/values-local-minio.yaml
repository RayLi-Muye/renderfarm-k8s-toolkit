namespace:
  create: true
  name: render-workers

replicaCount: 1

image:
  repository: busybox
  tag: "1.36"

worker:
  command:
    - /bin/sh
    - -c
  args:
    - while true; do echo "local minio placeholder render worker"; sleep 30; done
  env:
    RENDER_TMP_DIR: /work
    LOG_LEVEL: debug

adapters:
  queue:
    type: mock
    mock:
      queueName: local-queue
  storage:
    type: minio
    minio:
      endpoint: http://minio.minio.svc.cluster.local:9000
      assetBucket: render-assets
      outputBucket: render-output
      region: us-east-1
  identity:
    type: existingSecret
    existingSecret:
      name: render-worker-credentials

resources:
  requests:
    cpu: "100m"
    memory: 128Mi
  limits:
    cpu: "500m"
    memory: 256Mi

gpu:
  enabled: false

keda:
  enabled: false
