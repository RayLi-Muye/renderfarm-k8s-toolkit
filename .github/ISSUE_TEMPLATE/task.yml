name: Task
description: Track a small implementation or documentation task.
title: "[Task]: "
labels:
  - task
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What files or behavior should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence Update
      description: What README, docs, roadmap, or evidence-map updates should accompany this task?
    validations:
      required: false
  - type: textarea
    id: continuation
    attributes:
      label: Continuation Prompt
      description: Write the prompt a future contributor or agent can use to continue this delivery node.
      placeholder: |
        Implement ...
        Validate by ...
        Update evidence in ...
    validations:
      required: true
