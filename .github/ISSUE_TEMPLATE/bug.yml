name: Bug
description: Report incorrect chart behavior or documentation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: current
    attributes:
      label: Current Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the Helm command and values file.
    validations:
      required: true
  - type: textarea
    id: continuation
    attributes:
      label: Continuation Prompt
      description: Write the prompt a future contributor or agent can use if this bug fix needs follow-up work.
      placeholder: |
        Fix ...
        Validate by ...
        Update evidence in ...
    validations:
      required: false
