name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  helm:
    name: Helm chart validation
    runs-on: ubuntu-latest
    env:
      HELM_VERSION: v3.18.6
      HELM_PLATFORM: linux-amd64
      HELM_SHA256: 3f43c0aa57243852dd542493a0f54f1396c0bc8ec7296bbb2c01e802010819ce
      KUBECONFORM_VERSION: v0.8.0
      KUBECONFORM_PLATFORM: linux-amd64
      KUBECONFORM_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
      KUBE_VERSION: 1.31.0
      CRD_CATALOG_REF: 1de95b7e9cb737ba46b14fa5a033fee2e47d90a3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Helm
        run: |
          cd /tmp
          curl -fsSLO "https://get.helm.sh/helm-${HELM_VERSION}-${HELM_PLATFORM}.tar.gz"
          printf '%s  %s\n' "${HELM_SHA256}" "helm-${HELM_VERSION}-${HELM_PLATFORM}.tar.gz" | sha256sum -c -
          tar -xzf "helm-${HELM_VERSION}-${HELM_PLATFORM}.tar.gz"
          sudo install -m 0755 "${HELM_PLATFORM}/helm" /usr/local/bin/helm
          helm version --short

      - name: Install kubeconform
        run: |
          cd /tmp
          curl -fsSLO "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-${KUBECONFORM_PLATFORM}.tar.gz"
          printf '%s  %s\n' "${KUBECONFORM_SHA256}" "kubeconform-${KUBECONFORM_PLATFORM}.tar.gz" | sha256sum -c -
          tar -xzf "kubeconform-${KUBECONFORM_PLATFORM}.tar.gz"
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint
        run: helm lint charts/render-worker

      - name: Render default values
        run: |
          mkdir -p /tmp/rendered
          helm template render-worker charts/render-worker > /tmp/rendered/default.yaml

      - name: Render local example
        run: helm template render-worker charts/render-worker -f examples/values-local.yaml > /tmp/rendered/local.yaml

      - name: Render AWS GPU SQS example
        run: helm template render-worker charts/render-worker -f examples/values-aws-gpu-sqs.yaml > /tmp/rendered/aws-gpu-sqs.yaml

      - name: Validate rendered Kubernetes manifests
        run: |
          for manifest in /tmp/rendered/default.yaml /tmp/rendered/local.yaml /tmp/rendered/aws-gpu-sqs.yaml; do
            echo "Validating ${manifest}"
            kubeconform -strict -summary \
              -kubernetes-version "${KUBE_VERSION}" \
              -schema-location default \
              -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/${CRD_CATALOG_REF}/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json" \
              "${manifest}"
          done
