name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  helm:
    name: Helm chart validation
    runs-on: ubuntu-latest
    env:
      HELM_VERSION: v3.18.6
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Helm
        run: |
          curl -fsSL -o /tmp/helm.tar.gz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Helm lint
        run: helm lint charts/render-worker

      - name: Render default values
        run: helm template render-worker charts/render-worker

      - name: Render local example
        run: helm template render-worker charts/render-worker -f examples/values-local.yaml

      - name: Render AWS GPU SQS example
        run: helm template render-worker charts/render-worker -f examples/values-aws-gpu-sqs.yaml
